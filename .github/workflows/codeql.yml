name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly full scan, Monday 06:00 UTC — catches advisories in code that
    # hasn't changed since the last PR.
    - cron: '0 6 * * 1'

# Don't pile up redundant scans on rapid pushes to the same ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Adds maintainability/quality queries on top of the default
          # security suite.
          queries: security-and-quality

      # No build step: this is an interpreted JS/TS codebase, so CodeQL
      # extracts directly from source.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
