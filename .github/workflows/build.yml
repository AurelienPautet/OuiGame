name: Build Verification

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  push:
    branches: [master]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build client bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Mirror the engine declared in package.json / used by Heroku.
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Replicates the build Heroku runs at deploy time: the root `build` script
      # builds the web app (apps/web) via the pnpm workspace. Catching a broken
      # build here turns a failed deploy into a failed PR check.
      - name: Build
        run: pnpm run build
