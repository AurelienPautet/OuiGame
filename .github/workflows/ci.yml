name: CI

on:
  push:
    branches: [master]
  pull_request:

# Lint jobs only need to read the checked-out code.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (server + shared)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

  client-lint:
    name: Lint (client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: ESLint
        run: pnpm run lint
